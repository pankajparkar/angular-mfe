<section class="profile-container">
  <h2>User Profile</h2>
  <p>This is the <strong>Profile</strong> Microfrontend loaded via Module Federation.</p>

  <div class="profile-card">
    <div class="avatar">{{ user.name[0] }}</div>
    <div class="info">
      <h3>{{ user.name }}</h3>
      <p><strong>Email:</strong> {{ user.email }}</p>
      <p><strong>Role:</strong> {{ user.role }}</p>
      <p><strong>Joined:</strong> {{ user.joinedYear }}</p>
    </div>
  </div>
</section>
